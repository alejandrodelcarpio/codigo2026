<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formularios</title>
</head>
<body>
    <h1>Registro de Usuarios</h1>
    <!-- action recibe una url y lo que haces es guardar, modificar, actualizar la informacion
     segun lo que hagamos en el formulario
     Por defecto el method por defecto es get, a no ser que lo ingrese tacitamente.
     get ------ para obtener.
     post ----- para crear, esto si o si se debe escribir. se usa para poder crear.
     -->
    <form action="">
        <p>
            <input type="text" placeholder="nombre" name="nombre"> <!--El placeholder sirve para poner texto dentro del input-->
        </p>
        <p>
            <input type="text" placeholder="apellido" name="apellido">
        </p>
        <p>
            <input type="email" placeholder="e-mail" name="correo">
        </p>
        <p>
            <input type="date" name="fecha_nac">
        </p>
        <p>
            <input type="number"  placeholder="ingresa tu DNI" name="dni" >
        </p>
        <p>
            <input type="tel" placeholder="telefono" name="telefono" >
        </p>
        <p>
            <input type="password" placeholder="ingrese su contraseña" name="password" >
        </p>
        <p>Genero</p>
        <p>
            Masculino
            <input type="radio" name="genero" value="masculino">
        </p>
        <p>
            Femenino
            <input type="radio" name="genero" value="femenino">
        </p>
        <p>
            Otros
            <input type="radio" name="genero" value="otro">
        </p>
        <input type="text" value="PERU" readonly> <!--dicabled el valor de value no se envia al servidor pero 
        el readonly es de solo lectura y el value si se envia al servidor-->
        <p>Paises</p>
        <select name="" id="">
            <option value="" disabled selected>Paises</option><!--De esta forma se coloca el primer 
            valor en el select de forma desabilitada-->
            <option value="peru">Perú</option>
            <option value="argentina">Argentina</option>
            <option value="chile">Chile</option>
            <option value="colombia">Colombia</option>
            <option value="eeuu">EEUU</option>

        </select>
        <p>Ciudades</p>
        <select name="" id="">
            <option value="arequipa">Arequipa</option>
            <option value="lima">Lima</option>
            <option value="trujillo">Trujillo</option>
            <option value="tacna">Tacna</option>
            <option value="puno">Puno</option>
        </select>
        <p>Cursos</p>
        <p>
            JavaScript <input type="checkbox" name="curso_1">
        </p>
        <p>
            HTML <input type="checkbox" name="curso_2">
        </p>
        <p>
            CSS <input type="checkbox" name="curso_3">
        </p>
        <p>
            React JS<input type="checkbox" name="curso_4">
        </p>
        <p>
            Next JS<input type="checkbox" name="curso_5">
        </p>
        <button type="submit"> <!-- El button por defecto, dentro del formulario es del tipo submit
            Maximo por formulario solo se debe tener un button tipo submit-->
            Guardar
        </button>
    </form>
</body>
</html>
